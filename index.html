<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-7137238144396709">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7137238144396709" crossorigin="anonymous"></script>
    <title>GPT HUB | المنصة التقنية الشاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .hero { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; }
        .article-card { background: white; border-radius: 20px; transition: 0.3s; border: 1px solid #e2e8f0; cursor: pointer; }
        .article-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .view-section { display: none; }
        .active-view { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .content-body p { margin-bottom: 1.5rem; line-height: 2; color: #334155; font-size: 1.1rem; }
    </style>
</head>
<body>

    <!-- القائمة العلوية -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black text-blue-600 cursor-pointer" onclick="showHome()">GPT HUB</div>
            <div class="flex gap-6 font-bold">
                <a href="javascript:void(0)" onclick="showHome()" class="hover:text-blue-600">الرئيسية</a>
                <a href="https://gpthub21.blogspot.com" target="_blank" class="hover:text-blue-600">المدونة</a>
                <a href="https://github.com/ahmed2sultan2555/website/blob/main/app-ads.txt" target="_blank" class="text-slate-500">app-ads.txt</a>
            </div>
        </div>
    </nav>

    <main id="main-router">
        <!-- الصفحة الرئيسية -->
        <section id="home-view" class="view-section active-view">
            <div class="hero py-24 text-center">
                <h1 class="text-5xl font-black mb-6">موسوعة GPT HUB للتقنية</h1>
                <p class="text-xl text-slate-400 mb-10 max-w-2xl mx-auto">أكثر من 30 مقالاً احترافياً في تطوير التطبيقات، سيو بلوجر، والربح من AdMob و AdSense.</p>
                <div class="flex justify-center gap-4">
                    <a href="https://github.com/ahmed2sultan2555/website/blob/main/app-ads.txt" target="_blank" class="bg-blue-600 px-8 py-3 rounded-xl font-bold">فحص app-ads.txt</a>
                </div>
            </div>
            
            <div class="container mx-auto px-6 py-16 grid md:grid-cols-3 gap-8" id="articles-grid">
                <!-- سيتم ملؤها بواسطة JS -->
            </div>
        </section>

        <!-- صفحة عرض المقال -->
        <section id="article-view" class="view-section container mx-auto px-6 py-12 max-w-4xl">
            <button onclick="showHome()" class="text-blue-600 font-bold mb-8 flex items-center gap-2">← العودة للرئيسية</button>
            <div id="article-content"></div>
            
            <!-- إعلان أدسنس وسط المقال -->
            <div class="my-10 p-4 border-2 border-dashed border-slate-300 rounded-xl text-center">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7137238144396709" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="mt-16 border-t pt-10">
                <h3 class="text-2xl font-black mb-6">مقالات مشابهة</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="related-grid"></div>
            </div>
        </section>
    </main>

    <footer class="bg-slate-900 text-white py-12 text-center mt-20">
        <p class="font-bold mb-4">GPT HUB - جميع الحقوق محفوظة 2025</p>
        <p class="text-xs opacity-50">ca-pub-7137238144396709</p>
    </footer>

    <script>
        const titles = [
            "أسرار الربح من AdMob 2025", "تحسين سيو بلوجر للتصدر", "برمجة تطبيقات الأندرويد", "دليل ملفات app-ads.txt",
            "زيادة سعر النقرة في أدسنس", "حماية المواقع من الاختراق", "أفضل قوالب بلوجر المجانية", "الربح من تطبيقات فلاتر",
            "كيفية قبول موقعك في أدسنس", "استراتيجيات التسويق الإلكتروني", "تعلم جافا سكريبت للمبتدئين", "تصميم واجهات المستخدم UX",
            "حل مشكلة تقييد الإعلانات", "أدوات الذكاء الاصطناعي للمطورين", "تطوير المتاجر الإلكترونية", "أمن المعلومات الشخصية",
            "طرق جلب زوار لمدونتك", "تحليل بيانات جوجل كونسول", "دليل البدء في العمل الحر", "برمجة البوتات للتيليجرام",
            "إدارة السيرفرات السحابية", "تحسين سرعة قوالب بلوجر", "استهداف المحتوى الأجنبي", "تطوير ألعاب الموبايل",
            "أساسيات قواعد البيانات", "الفرق بين AdMob و AdSense", "شرح API جوجل مابس", "توثيق حسابات المطورين",
            "تحديثات جوجل الأخيرة 2025", "مستقبل تقنيات الويب"
        ];

        const articles = titles.map((t, i) => ({
            id: i + 1,
            title: t,
            desc: `تعلم في هذا المقال الشامل كل ما يخص ${t} وكيفية تطبيقه عملياً لتحقيق أفضل النتائج التقنية والربحية...`,
            content: Array(40).fill(`هذا سطر من المحتوى العميق والمنسق حول موضوع ${t}. نحن في GPT HUB نركز على تقديم شروحات احترافية تضمن لك الفهم الكامل وتطبيق الخطوات بدقة لتجاوز المنافسين في سوق العمل.`).join("<br><br>")
        }));

        function showHome() {
            document.getElementById('article-view').classList.remove('active-view');
            document.getElementById('home-view').classList.add('active-view');
            window.scrollTo(0,0);
        }

        function openArticle(id) {
            const art = articles.find(a => a.id === id);
            document.getElementById('article-content').innerHTML = `
                <h1 class="text-4xl font-black mb-6">${art.title}</h1>
                <div class="content-body">${art.content}</div>
            `;
            
            const relatedGrid = document.getElementById('related-grid');
            relatedGrid.innerHTML = articles.filter(a => a.id !== id).sort(() => 0.5 - Math.random()).slice(0, 4).map(a => `
                <div onclick="openArticle(${a.id})" class="p-3 bg-white border rounded-lg cursor-pointer text-sm font-bold hover:bg-blue-50">${a.title}</div>
            `).join('');

            document.getElementById('home-view').classList.remove('active-view');
            document.getElementById('article-view').classList.add('active-view');
            window.scrollTo(0,0);
        }

        document.getElementById('articles-grid').innerHTML = articles.map(a => `
            <div class="article-card p-6" onclick="openArticle(${a.id})">
                <h3 class="text-xl font-bold mb-4 text-slate-800">${a.title}</h3>
                <p class="text-slate-500 text-sm mb-4">${a.desc}</p>
                <span class="text-blue-600 font-bold">اقرأ المقال الكامل ←</span>
            </div>
        `).join('');
    </script>
</body>
</html>
