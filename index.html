<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة GPT HUB - التقنية والذكاء الاصطناعي</title>
    
    <!-- Google AdSense Verification - Mandatory -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7137238144396709" crossorigin="anonymous"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=IBM+Plex+Sans+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --primary: #2563eb; --dark: #0f172a; }
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background-color: #f1f5f9; color: var(--dark); }
        .premium-font { font-family: 'Cairo', sans-serif; }
        
        /* AdSense Placeholder Styles */
        .ad-slot { background: #f8fafc; border: 1px dashed #cbd5e1; text-align: center; padding: 20px; margin: 20px 0; border-radius: 12px; }
        
        .article-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; background: white; border-radius: 24px; overflow: hidden; }
        .article-card:hover { transform: translateY(-10px); shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); border-color: var(--primary); }
        
        .content-body { line-height: 2; font-size: 1.15rem; color: #334155; }
        .content-body h2 { color: var(--dark); font-weight: 800; font-size: 1.75rem; margin-top: 2rem; margin-bottom: 1rem; border-right: 5px solid var(--primary); padding-right: 15px; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <!-- Header & Navigation -->
    <nav class="sticky top-0 z-50 glass-nav border-b border-slate-200">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showHome()">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">G</div>
                <h1 class="text-xl font-black premium-font tracking-tight">GPT <span class="text-blue-600">HUB</span></h1>
            </div>
            <div class="hidden md:flex items-center gap-8 font-bold text-slate-600">
                <a href="#" onclick="showHome()" class="hover:text-blue-600 transition">الرئيسية</a>
                <a href="https://gpthub21.blogspot.com" target="_blank" class="hover:text-blue-600 transition">المدونة</a>
                <a href="https://ahmed2sultan2555.github.io/website/privacy.html" target="_blank" class="hover:text-blue-600 transition">الخصوصية</a>
                <a href="https://www.youtube.com/@Inspiring_voices493" target="_blank" class="text-red-600 flex items-center gap-1"><i data-lucide="youtube" class="w-4 h-4"></i> يوتيوب</a>
            </div>
        </div>
    </nav>

    <!-- Global Ad Unit 1: Top Banner -->
    <div class="container mx-auto px-4 mt-4">
        <div class="ad-slot">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7137238144396709" data-ad-slot="TOP_BANNER" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <p class="text-[10px] text-slate-400">إعلان AdSense - ca-pub-7137238144396709</p>
        </div>
    </div>

    <main id="app-content" class="container mx-auto px-4 py-8">
        <!-- Home View -->
        <section id="home-view">
            <div class="mb-12 text-center">
                <h2 class="text-4xl md:text-5xl font-black mb-4 premium-font text-slate-900">موسوعة التطوير والذكاء الاصطناعي</h2>
                <p class="text-slate-500 max-w-2xl mx-auto">مقالات حصرية، تطبيقات مبتكرة، وأحدث تقنيات الـ TDK والبرمجة بين يديك.</p>
            </div>

            <!-- Posts Grid -->
            <div id="posts-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Articles injected here -->
            </div>
        </section>

        <!-- Article View -->
        <section id="article-view" class="hidden max-w-4xl mx-auto">
            <button onclick="showHome()" class="mb-8 flex items-center gap-2 text-blue-600 font-bold hover:gap-4 transition-all">
                <i data-lucide="arrow-right"></i> العودة للرئيسية
            </button>
            <div id="article-content" class="bg-white p-6 md:p-12 rounded-[2rem] shadow-xl border border-slate-100">
                <!-- Detailed Post Content -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 text-white mt-20 py-12">
        <div class="container mx-auto px-4 text-center">
            <div class="flex justify-center gap-6 mb-8">
                <a href="https://gpthub21.blogspot.com" class="hover:text-blue-400 transition">بلوجر</a>
                <a href="https://ahmed2sultan2555.github.io/website/privacy.html" class="hover:text-blue-400 transition">الخصوصية</a>
                <a href="https://groups.google.com/g/googleplay-app-testers" class="hover:text-blue-400 transition">المختبرين</a>
            </div>
            <p class="text-slate-500 text-sm italic">ID: ca-pub-7137238144396709 | © 2026 GPT HUB Encyclopedia</p>
        </div>
    </footer>

    <script>
        const myApps = [
            { name: "Memory Master", link: "https://play.google.com/store/apps/details?id=com.gpthub.memory_master", icon: "brain", desc: "لعبة الذاكرة الممتعة" },
            { name: "AutoCare", link: "https://play.google.com/store/apps/details?id=com.gpthub.auto_care", icon: "car", desc: "مساعد صيانة سيارتك" },
            { name: "أكاديمية الأرقام", link: "https://play.google.com/store/apps/details?id=com.gpthub.speak_numbers", icon: "languages", desc: "تعليم الأطفال الأرقام" }
        ];

        // Unique Image Keywords for 30 articles
        const imgKeywords = ["coding", "ai", "future", "mobile", "app", "server", "cyber", "data", "robot", "cloud", "developer", "startup", "brain", "network", "digital", "security", "web", "android", "iphone", "google", "logic", "strategy", "engine", "car", "tool", "smart", "education", "money", "growth", "global"];

        const postsData = Array.from({ length: 30 }, (_, i) => ({
            id: i + 1,
            title: i === 0 ? "Memory Master: أقوى لعبة لتدريب الذاكرة" : 
                   i === 1 ? "AutoCare: دليلك الذكي لصيانة السيارات" : 
                   i === 2 ? "أكاديمية الأرقام والتعلم السريع" : `استراتيجيات الـ TDK والذكاء الاصطناعي ${i+1}`,
            category: i < 3 ? "تطبيقاتي" : "AI & Tech",
            keyword: imgKeywords[i % imgKeywords.length],
            summary: "نستعرض في هذا المقال التقنيات الحديثة وكيفية دمجها في مشاريعك البرمجية لتحقيق أقصى استفادة."
        }));

        function renderHome() {
            const container = document.getElementById('posts-container');
            container.innerHTML = postsData.map(post => `
                <div class="article-card flex flex-col cursor-pointer" onclick="openArticle(${post.id})">
                    <img src="https://source.unsplash.com/featured/800x450?${post.keyword}" class="w-full h-48 object-cover" alt="${post.title}">
                    <div class="p-6">
                        <span class="text-blue-600 text-xs font-black uppercase tracking-widest">${post.category}</span>
                        <h3 class="text-xl font-black mt-2 mb-3 leading-tight text-slate-900">${post.title}</h3>
                        <p class="text-slate-500 text-sm line-clamp-2">${post.summary}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openArticle(id) {
            const post = postsData.find(p => p.id === id);
            const view = document.getElementById('article-content');
            
            // Build the Related Apps Section
            const appsSection = `
                <div class="mt-12 bg-slate-50 p-8 rounded-3xl border border-slate-200">
                    <h3 class="text-2xl font-black mb-6 premium-font">مركز تطبيقاتنا المميزة</h3>
                    <div class="grid md:grid-cols-3 gap-4">
                        ${myApps.map(app => `
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                                <i data-lucide="${app.icon}" class="w-8 h-8 mx-auto mb-2 text-blue-600"></i>
                                <h4 class="font-bold text-sm mb-2">${app.name}</h4>
                                <a href="${app.link}" target="_blank" class="text-blue-500 text-[10px] font-black underline">تحميل الآن</a>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            // Build Related Posts Section
            const relatedPosts = postsData.filter(p => p.id !== id).slice(0, 3);
            const relatedSection = `
                <div class="mt-12">
                    <h3 class="text-2xl font-black mb-6 premium-font">مقالات ذات صلة</h3>
                    <div class="grid md:grid-cols-3 gap-4">
                        ${relatedPosts.map(p => `
                            <div class="cursor-pointer group" onclick="openArticle(${p.id})">
                                <img src="https://source.unsplash.com/featured/400x250?${p.keyword}" class="rounded-xl mb-2 group-hover:opacity-80 transition">
                                <h4 class="font-bold text-xs line-clamp-2 leading-relaxed">${p.title}</h4>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            view.innerHTML = `
                <img src="https://source.unsplash.com/featured/1200x600?${post.keyword}" class="w-full h-64 md:h-96 object-cover rounded-[1.5rem] mb-10">
                <h1 class="text-3xl md:text-5xl font-black premium-font mb-6">${post.title}</h1>
                
                <!-- Ad Unit 2: In-Article Ad -->
                <div class="ad-slot">
                    <ins class="adsbygoogle" style="display:block; text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-7137238144396709" data-ad-slot="ARTICLE_AD"></ins>
                    <p class="text-[8px] text-slate-300">AD: ca-pub-7137238144396709</p>
                </div>

                <div class="content-body">
                    <p>في عالم التكنولوجيا المتسارع، يبرز <strong>${post.title}</strong> كأحد الحلول المبتكرة التي نقدمها في موسوعة GPT HUB. نحن لا نكتفي بتقديم المعلومات، بل نصمم تجارب مستخدم فريدة تدمج بين الذكاء الاصطناعي والكفاءة البرمجية.</p>
                    <h2>الرؤية التقنية العميقة</h2>
                    <p>يعتمد هذا المجال على فهم دقيق لخوارزميات الـ TDK (Title, Description, Keywords). لقد قمنا في كافة تطبيقاتنا، سواء كانت ألعاب ذاكرة أو أدوات صيانة، بتطبيق أعلى معايير الجودة لضمان تصدر نتائج البحث وتوفير قيمة حقيقية للمستخدمين.</p>
                    <p>المستقبل يتجه نحو التطبيقات التي تفهم احتياجات المستخدم قبل أن يطلبها، وهذا هو السر الذي نكشف عنه في مقالاتنا التعليمية الموجهة للمطورين العرب.</p>
                </div>

                <!-- Ad Unit 3: Sidebar/Bottom Ad -->
                <div class="ad-slot">
                    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7137238144396709" data-ad-slot="BOTTOM_AD" data-ad-format="rectangle"></ins>
                </div>

                ${appsSection}
                ${relatedSection}
            `;

            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('article-view').classList.remove('hidden');
            window.scrollTo(0, 0);
            lucide.createIcons();
            
            // Re-trigger AdSense
            try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
        }

        function showHome() {
            document.getElementById('article-view').classList.add('hidden');
            document.getElementById('home-view').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        window.onload = () => {
            renderHome();
            // Initial AdSense push
            try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
        };
    </script>
</body>
</html>
